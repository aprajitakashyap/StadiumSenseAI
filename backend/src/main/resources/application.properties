spring.application.name=stadiumsense-backend

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/stadiumsense}
spring.datasource.username=${DB_USER:stadiumsense}
spring.datasource.password=${DB_PASSWORD:stadiumsense}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Server
server.port=${PORT:8080}

# Gemini
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-1.5-flash

# Logging
logging.level.com.stadiumsense=INFO
logging.level.org.flywaydb=INFO
