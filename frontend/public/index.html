<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StadiumSenseAI – FIFA World Cup Stadium Assistant" />
  <title>StadiumSenseAI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0a0e1a;
      --card:    #0d1224;
      --bubble:  #111827;
      --border:  #1e2d4a;
      --accent:  #00e676;
      --acc-dk:  #00c853;
      --text:    #e5e7eb;
      --muted:   #6b7280;
      --danger:  #f87171;
      --r:       14px;
    }

    html, body { height: 100%; background: var(--navy); color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; line-height: 1.5; }

    /* ── Layout ── */
    #app {
      display: flex; flex-direction: column;
      height: 100dvh; max-width: 700px; margin: 0 auto;
      background: var(--card); box-shadow: 0 0 80px rgba(0,0,0,.7);
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: var(--navy);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .h-left { display: flex; align-items: center; gap: 11px; }
    .logo {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--acc-dk));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(0,230,118,.3);
    }
    .brand h1 { font-size: 16px; font-weight: 700; color: #fff; }
    .brand p  { font-size: 11px; color: var(--accent); font-weight: 500; }
    .h-right { display: flex; align-items: center; gap: 12px; }
    .online { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
      animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    .lang-group { display: flex; gap: 2px; background: var(--border); border-radius: 8px; padding: 3px; }
    .lang-btn {
      border: none; cursor: pointer; padding: 5px 10px; border-radius: 6px;
      font-size: 12px; font-weight: 600;
      background: transparent; color: var(--muted); transition: all .2s;
    }
    .lang-btn.active { background: var(--accent); color: var(--navy); }
    .lang-btn:hover:not(.active) { color: #fff; }

    /* ── Chat ── */
    #chat {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .row { display: flex; align-items: flex-end; gap: 8px; animation: up .22s ease-out; }
    .row.user { flex-direction: row-reverse; }
    @keyframes up { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }

    .av {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; user-select: none;
    }
    .av.ai   { background: var(--border); border: 1px solid rgba(0,230,118,.3); }
    .av.user { background: var(--accent); color: var(--navy); }

    .bub {
      max-width: 72%; padding: 10px 14px; border-radius: var(--r);
      font-size: 14px; line-height: 1.6; word-break: break-word; white-space: pre-wrap;
    }
    .bub.ai   { background: var(--bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
    .bub.user { background: var(--accent); color: var(--navy); font-weight: 500; border-bottom-right-radius: 4px; }
    .ts { display: block; font-size: 11px; margin-top: 4px; opacity: .5; }
    .bub.user .ts { text-align: right; }

    .typing { display: flex; gap: 5px; padding: 4px 2px; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
      animation: bounce 1.3s infinite;
    }
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    @keyframes bounce { 0%,80%,100%{transform:scale(.5);opacity:.4} 40%{transform:scale(1);opacity:1} }

    .err {
      text-align: center; font-size: 12px; color: var(--danger);
      background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.2);
      border-radius: 8px; padding: 8px 14px; animation: up .2s ease-out;
    }

    /* ── Chips ── */
    #chips { padding: 0 16px 10px; display: flex; flex-wrap: wrap; gap: 8px; }
    #chips-label { width: 100%; font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .chip {
      border: 1px solid rgba(0,230,118,.35); background: transparent; color: var(--accent);
      border-radius: 20px; padding: 6px 13px; font-size: 12px; cursor: pointer;
      white-space: nowrap; max-width: 260px; overflow: hidden; text-overflow: ellipsis;
      transition: all .2s;
    }
    .chip:hover { background: rgba(0,230,118,.1); border-color: var(--accent); }

    /* ── Input bar ── */
    #bar {
      display: flex; align-items: flex-end; gap: 8px;
      padding: 12px 16px; background: var(--navy);
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    #inp {
      flex: 1; resize: none; min-height: 44px; max-height: 120px;
      background: var(--bubble); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 14px;
      color: var(--text); font-size: 14px; font-family: inherit;
      outline: none; transition: border-color .2s; line-height: 1.45;
    }
    #inp::placeholder { color: var(--muted); }
    #inp:focus { border-color: var(--accent); }
    #send {
      width: 44px; height: 44px; flex-shrink: 0; border: none; cursor: pointer;
      border-radius: 12px; background: var(--accent); color: var(--navy);
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; box-shadow: 0 4px 12px rgba(0,230,118,.25);
    }
    #send:hover { background: var(--acc-dk); }
    #send:disabled { background: var(--border); color: var(--muted); box-shadow: none; cursor: not-allowed; }
    #send svg { width: 20px; height: 20px; }

    @media(max-width:480px){ .online{display:none} .bub{max-width:85%} }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="h-left">
      <div class="logo" aria-hidden="true">🏟️</div>
      <div class="brand">
        <h1>StadiumSenseAI</h1>
        <p>FIFA World Cup Assistant</p>
      </div>
    </div>
    <div class="h-right">
      <div class="online" aria-hidden="true"><span class="dot"></span>Online</div>
      <div class="lang-group" role="group" aria-label="Select language">
        <button class="lang-btn active" data-lang="en" aria-pressed="true">EN</button>
        <button class="lang-btn"        data-lang="es" aria-pressed="false">ES</button>
        <button class="lang-btn"        data-lang="fr" aria-pressed="false">FR</button>
      </div>
    </div>
  </header>

  <div id="chat" role="log" aria-live="polite" aria-label="Chat messages"></div>
  <div id="chips" aria-label="Suggested questions"></div>

  <div id="bar">
    <textarea id="inp" rows="1"
      placeholder="Ask about gates, seats, food, accessible routes…"
      aria-label="Type your message"></textarea>
    <button id="send" aria-label="Send message" disabled>
      <svg fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const chatEl  = document.getElementById('chat');
  const chipsEl = document.getElementById('chips');
  const inp     = document.getElementById('inp');
  const sendBtn = document.getElementById('send');

  let lang    = 'en';
  let busy    = false;
  let chipsOn = true;

  const PLACEHOLDERS = {
    en: 'Ask about gates, seats, food, accessible routes…',
    es: 'Pregunta sobre puertas, asientos, comida, rutas accesibles…',
    fr: 'Posez vos questions sur portes, sièges, nourriture, itinéraires…',
  };
  const CHIP_LABELS = { en: 'Quick questions:', es: 'Preguntas rápidas:', fr: 'Questions rapides:' };

  // Language buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      lang = btn.dataset.lang;
      document.querySelectorAll('.lang-btn').forEach(b => {
        b.classList.toggle('active', b === btn);
        b.setAttribute('aria-pressed', b === btn ? 'true' : 'false');
      });
      inp.placeholder = PLACEHOLDERS[lang];
    });
  });

  // Input resize + send button state
  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
    sendBtn.disabled = !inp.value.trim() || busy;
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) send(); }
  });
  sendBtn.addEventListener('click', send);

  function ts() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMsg(role, text) {
    const row = document.createElement('div');
    row.className = `row ${role}`;

    const av  = document.createElement('div');
    av.className = `av ${role}`;
    av.textContent = role === 'user' ? '👤' : '⚽';
    av.setAttribute('aria-hidden', 'true');

    const bub = document.createElement('div');
    bub.className = `bub ${role}`;
    bub.textContent = text;

    const t = document.createElement('span');
    t.className = 'ts';
    t.textContent = ts();
    bub.appendChild(t);

    row.append(av, bub);
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function addTyping() {
    const row = document.createElement('div');
    row.className = 'row ai'; row.id = 'typing';
    const av = document.createElement('div');
    av.className = 'av ai'; av.textContent = '⚽'; av.setAttribute('aria-hidden','true');
    const bub = document.createElement('div');
    bub.className = 'bub ai';
    bub.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    row.append(av, bub); chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() { document.getElementById('typing')?.remove(); }

  function addError(msg) {
    const d = document.createElement('div');
    d.className = 'err'; d.setAttribute('role', 'alert'); d.textContent = msg;
    chatEl.appendChild(d); chatEl.scrollTop = chatEl.scrollHeight;
    setTimeout(() => d.remove(), 5000);
  }

  async function send(prefill) {
    const msg = typeof prefill === 'string' ? prefill : inp.value.trim();
    if (!msg || busy) return;

    if (chipsOn) { chipsEl.innerHTML = ''; chipsOn = false; }

    addMsg('user', msg);
    inp.value = ''; inp.style.height = 'auto'; sendBtn.disabled = true;
    busy = true; addTyping();

    try {
      const res  = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, language: lang }),
      });
      if (!res.ok) throw new Error(`${res.status}`);
      const data = await res.json();
      removeTyping();
      addMsg('ai', data.response);
    } catch {
      removeTyping();
      addError({ en: 'Could not connect. Please try again.', es: 'No se pudo conectar. Intenta de nuevo.', fr: 'Impossible de se connecter. Réessayez.' }[lang]);
    } finally {
      busy = false;
      sendBtn.disabled = !inp.value.trim();
    }
  }

  // Load FAQ chips
  async function loadChips() {
    try {
      const r    = await fetch('/faq');
      const faqs = await r.json();
      if (!faqs.length) return;
      const lbl = document.createElement('div');
      lbl.id = 'chips-label'; lbl.setAttribute('aria-hidden','true');
      lbl.textContent = CHIP_LABELS[lang] || CHIP_LABELS.en;
      chipsEl.appendChild(lbl);
      faqs.slice(0, 4).forEach(f => {
        const b = document.createElement('button');
        b.className = 'chip'; b.textContent = f.question; b.title = f.question;
        b.addEventListener('click', () => send(f.question));
        chipsEl.appendChild(b);
      });
    } catch { /* backend not ready yet */ }
  }

  // Welcome
  addMsg('ai', 'Welcome to StadiumSenseAI! 🏟️\nI\'m your guide for the FIFA World Cup stadium. Ask me about:\n🚪 Gates & Entry  💺 Seating  🍔 Food & Drinks\n🚻 Restrooms  🅿️ Parking  🚇 Metro  ♿ Accessible Routes\n\nHow can I help you today?');
  loadChips();
</script>
</body>
</html>
