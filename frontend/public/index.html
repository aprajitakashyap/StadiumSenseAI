<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="StadiumSenseAI – Smart AI Assistant for FIFA World Cup 2026" />
  <title>StadiumSenseAI</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- Branded splash screen -->
  <div id="splash" role="status" aria-label="Loading StadiumSenseAI">
    <div class="sp-logo" aria-hidden="true">🏟️</div>
    <div class="sp-title">StadiumSenseAI</div>
    <div class="sp-sub">Smart AI · FIFA World Cup 2026</div>
    <div class="sp-dots" aria-hidden="true"><span></span><span></span><span></span></div>
  </div>

  <div id="app">

    <header>
      <div class="h-left">
        <div class="h-logo" aria-hidden="true">🏟️</div>
        <div class="h-brand">
          <h1>StadiumSenseAI</h1>
          <p>FIFA World Cup 2026 · Powered by Gemini AI</p>
        </div>
      </div>
      <div class="h-right">
        <div class="online" aria-hidden="true"><span class="dot"></span>Live</div>
        <div class="lang-group" role="group" aria-label="Select language">
          <button class="lang-btn active" data-lang="en" aria-pressed="true">EN</button>
          <button class="lang-btn"        data-lang="es" aria-pressed="false">ES</button>
          <button class="lang-btn"        data-lang="fr" aria-pressed="false">FR</button>
        </div>
      </div>
    </header>

    <!-- Live status bar -->
    <div id="status-bar" aria-label="Live stadium status"></div>

    <!-- Quick action cards -->
    <div id="actions" role="toolbar" aria-label="Quick actions"></div>

    <!-- Chat -->
    <div id="chat" role="log" aria-live="polite" aria-label="Chat messages"></div>

    <!-- FAQ chips -->
    <div id="chips" aria-label="Suggested questions"></div>

    <!-- Input -->
    <div id="bar">
      <textarea id="inp" rows="1"
        placeholder="Ask about crowds, queues, routes, accessibility…"
        aria-label="Type your message"></textarea>
      <button id="send" aria-label="Send message" disabled>
        <svg fill="currentColor" viewBox="0 0 24 24">
          <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
        </svg>
      </button>
    </div>

  </div>

  <script src="./app.js"></script>
</body>
</html>
